# fly.toml — fly.io VPS 배포 설정
# 사용법: fly launch --config fly.toml (단계 10)
app = "kids-edu"       # fly launch 시 실제 앱 이름으로 교체
primary_region = "nrt" # 도쿄 (한국 가장 가까운 fly.io 리전)

[build]
  dockerfile = "src/backend/Dockerfile"

[env]
  PORT = "8000"
  BACKEND_BASE_URL = "https://kids-edu.fly.dev"  # 실제 URL로 교체

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

[[mounts]]
  source = "kids_edu_data"
  destination = "/app/data"
